name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            _build/default/lib
            _build/test/lib
          key: ${{ runner.os }}-rebar3-${{ hashFiles('rebar.config') }}

      - name: Restore Dialyzer PLT cache
        uses: actions/cache@v4
        with:
          path: _build/default/rebar3_*_plt
          key: ${{ runner.os }}-dialyzer-otp28-${{ hashFiles('rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-otp28-

      - name: Download and build CLIPS
        run: |
          mkdir -p /tmp/clips_build
          curl -sL https://sourceforge.net/projects/clipsrules/files/CLIPS/6.40/clips_core_source_640.tar.gz/download \
            | tar xz -C /tmp/clips_build
          cd apps/clips_port && make CLIPS_SRC=/tmp/clips_build/clips_core_source_640/core

      - name: Compile
        run: rebar3 compile

      - name: EUnit
        run: rebar3 eunit

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: Coverage
        run: rebar3 cover --verbose

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ercpa:test

      - name: Start container
        run: |
          docker run -d --name ercpa-test -p 8317:8317 ercpa:test
          sleep 5

      - name: Health check
        run: |
          curl -sf http://127.0.0.1:8317/healthz

      - name: Test models endpoint
        run: |
          curl -sf http://127.0.0.1:8317/v1/models | grep -q '"object"'

      - name: Cleanup
        if: always()
        run: docker rm -f ercpa-test
